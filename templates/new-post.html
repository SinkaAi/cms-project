<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post | DKCGI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tiny.cloud/1/06xne236pmioewt3io6alx53raocht5r6y51mhcbvl411vp0/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        :root {
            --bg-base: #0C0C0C;
            --bg-surface: #151515;
            --bg-elevated: #1C1C1C;
            --bg-input: #1A1A1A;
            --border: #222222;
            --border-hover: #333333;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #FF6363;
            --accent-hover: #FF8080;
            --accent-muted: #2D1F1F;
            --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        .light-mode {
            --bg-base: #FAFAF8;
            --bg-surface: #FFFFFF;
            --bg-elevated: #F5F5F3;
            --bg-input: #FAFAF8;
            --border: #E8E8E6;
            --border-hover: #D0D0CC;
            --text-primary: #1A1A1A;
            --text-secondary: rgba(0, 0, 0, 0.7);
            --text-muted: rgba(0, 0, 0, 0.5);
            --accent: #E54545;
            --accent-hover: #D13636;
            --accent-muted: #FDF0F0;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-base);
            margin: 0;
            font-family: var(--font-sans);
            color: var(--text-primary);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Override main's max-width and centering */
        main {
            max-width: none !important;
            margin: 0 !important;
            width: 100% !important;
        }

        .admin-main {
            flex: 1;
            margin-left: 240px !important;
            padding: 2rem 2.5rem;
            width: calc(100% - 240px) !important;
        }

        .admin-sidebar {
            width: 240px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .nexus-ring-small {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: relative;
            animation: nexus-spin 3s linear infinite;
        }

        .nexus-ring-small::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 2px solid transparent;
            border-top-color: #4ade80;
            border-radius: 50%;
        }

        @keyframes nexus-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sidebar-nav {
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.15s ease;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(0, 217, 255, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .sidebar-footer {
            padding: 1rem 0;
            border-top: 1px solid var(--border);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.15s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4ade80) !important;
            color: #000 !important;
            border: none !important;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.25);
        }

        .post-form {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group input[type="url"],
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group small {
            display: block;
            margin-top: 0.35rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* WYSIWYG Editor */
        .editor-wrapper {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
        }

        .toolbar-group {
            display: flex;
            gap: 0.25rem;
            padding-right: 0.75rem;
            border-right: 1px solid var(--border);
            margin-right: 0.5rem;
        }

        .toolbar-group:last-child {
            border-right: none;
            margin-right: 0;
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .toolbar-btn.active {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
            border-color: rgba(0, 217, 255, 0.3);
        }

        .toolbar-btn[data-format="format-block"] {
            font-weight: 600;
            font-size: 0.75rem;
        }

        .editor-content {
            min-height: 350px;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
        }

        .editor-content:empty:before {
            content: 'Start writing your post...';
            color: var(--text-muted);
        }

        .editor-content h1 { font-size: 1.75rem; margin: 1rem 0 0.5rem; }
        .editor-content h2 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        .editor-content h3 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
        .editor-content p { margin: 0.75rem 0; }
        .editor-content ul, .editor-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .editor-content blockquote {
            margin: 1rem 0;
            padding: 0.75rem 1rem;
            border-left: 3px solid var(--accent);
            background: rgba(0, 217, 255, 0.05);
        }

        .editor-content a {
            color: var(--accent);
            text-decoration: underline;
        }

        .editor-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .editor-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        .editor-content pre code {
            background: none;
            padding: 0;
        }

        /* Hidden textarea for form submission */
        #content-source {
            display: none;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        /* Link dialog */
        .dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .dialog-overlay.show {
            display: flex;
        }

        .dialog {
            background: #1a1f2e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            width: 400px;
            max-width: 90%;
        }

        .dialog h3 {
            margin: 0 0 1rem;
            font-size: 1.1rem;
        }

        .dialog input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .dialog input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .dialog-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-logo">
                    <span class="nexus-ring-small"></span>
                    <span>DKCGI</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/admin/new" class="nav-item active">
                    <span class="nav-icon">✏️</span>
                    <span>New Post</span>
                </a>
                <a href="/admin/pages" class="nav-item">
                    <span class="nav-icon">📄</span>
                    <span>Pages</span>
                </a>
                <a href="/admin/settings" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🌐</span>
                    <span>View Site</span>
                </a>
                <a href="/logout" class="nav-item">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="page-header">
                <h1>Create New Post</h1>
                <a href="/admin" class="btn">← Back to Admin</a>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" class="post-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter post title" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="categories">Categories</label>
                        <input type="text" id="categories" name="categories" placeholder="3DS Max, Lighting, V-Ray">
                        <small>Comma-separated list of categories</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="featured" value="true">
                        ⭐ Mark as Featured Post
                    </label>
                    <small>Featured posts are highlighted on the homepage</small>
                </div>
                
                <div class="form-group">
                    <label for="thumbnail">Thumbnail URL</label>
                    <input type="url" id="thumbnail" name="thumbnail" placeholder="https://img.youtube.com/vi/VIDEO_ID/maxresdefault.jpg">
                    <small>YouTube video thumbnail URL (optional)</small>
                </div>
                
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="editor" name="content"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Publish Post</button>
                    <a href="/admin" class="btn">Cancel</a>
                </div>
            </form>
        </main>
    </div>

    <!-- Link Dialog -->
<script>
        tinymce.init({
            selector: '#editor',
            plugins: [
                'advlist', 'autolink', 'lists', 'link', 'image', 'charmap',
                'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
                'insertdatetime', 'media', 'table', 'preview', 'help', 'wordcount'
            ],
            toolbar: 'undo redo | formatselect | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image table | removeformat help',
            menubar: 'file edit view insert format table tools help',
            min_height: 600,
            resize: true,
            branding: false,
            content_style: `
                body {
                    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
                    font-size: 1rem;
                    line-height: 1.6;
                    color: #e0e0e0;
                    background: #1a1a1a;
                    padding: 1rem;
                }
            `,
            skin: 'oxide-dark',
            content_css: false
        });
    </script>
</body>
</html>
