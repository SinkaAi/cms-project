<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="scanline"></div>
    <header>
        <nav>
            <a href="/" class="logo">
                <span class="nexus-logo">
                    <span class="nexus-ring"></span>
                    <span class="nexus-text">NEXUS</span>
                </span>
            </a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/character">Character</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/admin">Admin</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 <span class="footer-nexus">NEXUS</span>. Built with 🧠 by Sinka.</p>
    </footer>

    <script>
        // Check for saved theme preference on load and set button accordingly
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
        
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('light-mode')) {
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }
        
        // Highlight current page in nav
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-links a').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
        
        // Image Slider
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.slider-dots .dot');
        const wrapper = document.querySelector('.slider-wrapper');
        const totalSlides = slides.length;
        
        function goToSlide(n) {
            currentSlide = n;
            if (currentSlide >= totalSlides) currentSlide = 0;
            if (currentSlide < 0) currentSlide = totalSlides - 1;
            
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === currentSlide);
            });
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }
        
        function changeSlide(direction) {
            goToSlide(currentSlide + direction);
        }
        
        // Auto-advance slides every 5 seconds
        setInterval(() => changeSlide(1), 5000);
    </script>
</body>
</html>
